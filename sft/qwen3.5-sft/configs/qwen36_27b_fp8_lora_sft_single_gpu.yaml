# Single-GPU PEFT SFT on the FP8 Qwen3.6 checkpoint.
#
# This is the practical one-H200 path. It trains LoRA adapters against the
# FP8-quantized checkpoint and uses packed text sequences.

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 50
  val_every_steps: 50
  max_steps: 10

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.6-27B-FP8
  attn_implementation: sdpa
  torch_dtype: bf16
  output_hidden_states: true

compile:
  enabled: false
  mode: default
  fullgraph: false
  dynamic: true
  backend: null

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/qwen36_27b_fp8_lora_sft/
  model_save_format: safetensors
  save_consolidated: final

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  exclude_modules:
    - "*lm_head"
  dim: 8
  alpha: 32
  dropout: 0.0
  use_triton: true

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: data/smoke_train.jsonl
  seq_length: 8192
  truncation: true
  skip_invalid_samples: true

packed_sequence:
  packed_sequence_size: 8192
  packing_strategy: thd

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 16
  shuffle: true
  num_workers: 0
  pin_memory: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: data/smoke_val.jsonl
  seq_length: 8192
  truncation: true
  skip_invalid_samples: true

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 16
  num_workers: 0
  pin_memory: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1.0e-8
  lr: 1.0e-4
  weight_decay: 0.0
  fused: true

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-5
