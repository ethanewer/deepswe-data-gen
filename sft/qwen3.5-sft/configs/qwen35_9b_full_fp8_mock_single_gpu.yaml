# Internal fit-test config: full-parameter FP8 Qwen3.5-9B on synthetic
# already-tokenized samples of a fixed length. This avoids tokenizer/dataset
# effects when testing whether a raw sequence length fits on one GPU.

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 1
  local_batch_size: 1
  ckpt_every_steps: 50
  val_every_steps: 50
  max_steps: 1

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.5-9B
  attn_implementation: sdpa
  torch_dtype: bf16
  output_hidden_states: true
  text_config:
    output_hidden_states: true
  use_liger_kernel: false

compile:
  enabled: true
  mode: default
  fullgraph: false
  dynamic: false
  backend: null

fp8:
  enabled: true
  recipe_name: tensorwise
  enable_fsdp_float8_all_gather: true
  precompute_float8_dynamic_scale_for_fsdp: true
  force_recompute_fp8_weight_in_bwd: true
  filter_fqns: ["lm_head"]
  emulate: false

checkpoint:
  enabled: false
  checkpoint_dir: checkpoints/qwen35_9b_full_fp8_mock/
  model_save_format: torch_save
  save_consolidated: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock.build_unpacked_dataset
  num_sentences: 1
  mean_len: 24575
  std_len: 0
  vocab_size: 100
  max_sentence_len: 24575

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 16
  shuffle: false
  num_workers: 0
  pin_memory: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.mock.build_unpacked_dataset
  num_sentences: 1
  mean_len: 24575
  std_len: 0
  vocab_size: 100
  max_sentence_len: 24575

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 16
  num_workers: 0
  pin_memory: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1.0e-8
  lr: 1.0e-5
  weight_decay: 0.01
  fused: true

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6
