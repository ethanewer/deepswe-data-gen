# Single-GPU full-parameter BF16 SFT for Qwen3.5-4B with sequence packing.
#
# The default is the measured single-H200 throughput target. Qwen3.5 uses a
# hybrid linear/full-attention stack; short 4k packs at larger local batch beat
# longer packs for raw tokens/sec while preserving online tokenization/packing.
# Override PACK_SIZE and LOCAL_BATCH_SIZE when longer packed sequences are
# preferred over throughput.

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 32
  local_batch_size: 32
  ckpt_every_steps: 50
  val_every_steps: 50
  max_steps: 10

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.5-4B
  attn_implementation: flash_attention_3
  torch_dtype: bf16
  output_hidden_states: true
  text_config:
    output_hidden_states: true

compile:
  enabled: false
  mode: default
  fullgraph: false
  dynamic: true
  backend: null

fp8:
  enabled: false

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/qwen35_4b_bf16_packed_sft/
  model_save_format: torch_save
  save_consolidated: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true
  enable_compile: true

clip_grad_norm:
  enabled: true
  max_norm: 1.0

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: data/smoke_train.jsonl
  split: train
  seq_length: 4096
  truncation: true
  skip_invalid_samples: true

packed_sequence:
  packed_sequence_size: 4096
  packing_strategy: thd

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 16
  shuffle: true
  num_workers: 0
  pin_memory: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: data/smoke_val.jsonl
  split: validation
  seq_length: 4096
  truncation: true
  skip_invalid_samples: true

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 16
  num_workers: 0
  pin_memory: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1.0e-8
  lr: 1.0e-5
  weight_decay: 0.01
  fused: true

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6
