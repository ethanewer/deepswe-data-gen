# v80 Qwen3-4B-Thinking SFT recipe.
#
# Goal: reproduce the effective v54 winning recipe through the s49 window, then
# cool down quickly enough to test whether the same behavior can scale past 50
# steps without the s99 collapse observed in v54.
#
# Effective v54 runtime controls, from:
# /scratch/ewer/qwen3-sft-local/logs/qwen3_4b_swe260616_v54_raw2030_strictpassed_lr1e6_from_base_h20017_8gpu_20260616T205050Z.log
# - base Qwen/Qwen3-4B-Thinking-2507 start
# - no prefix expansion
# - 260616 raw2030 strict-passed Mini-SWE-aligned data view
# - seed 61654, shuffle_files=false, repeat=true
# - 65k online packing
# - global batch size 16
# - full assistant loss spans with v54 submit-verification masks
# - AdamW beta=(0.9, 0.95), LR 1e-6, weight decay 0.01, grad clip 1.0
#
# Intentional change from v54:
# - WSD LR: same 25-step warmup and 1e-6 peak, hold through about s49, then
#   cosine-decay over s50-s80 to 5e-8 and keep that floor through s125.

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 16
  local_batch_size: 2
  ckpt_every_steps: 25
  val_every_steps: 1000
  max_steps: 125

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 33333
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-4B-Thinking-2507
  attn_implementation: flash_attention_3
  torch_dtype: bf16
  output_hidden_states: true

compile:
  enabled: false
  mode: default
  fullgraph: false
  dynamic: true
  backend: null

fp8:
  enabled: false

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/qwen3_4b_thinking_swe260616_v80_v54_repro_wsd_cooldown_from_base_65k_sft/
  model_save_format: safetensors
  save_consolidated: final
  v4_compatible: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true
  enable_compile: true
  enable_fsdp2_prefetch: true
  fsdp2_backward_prefetch_depth: 3
  fsdp2_forward_prefetch_depth: 1

clip_grad_norm:
  enabled: true
  max_norm: 1.0

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

dataset:
  _target_: qwen_agentic_sft.online_packed_dataset.OnlinePackedChatDataset
  raw_root: /wbl-fast/usrs/ee/code-swe-data/data/new-synthetic-data/260616/swerebench-raw2030-targeted-limitations-strict-passed-miniswe-aligned/data
  chat_template_path: /wbl-fast/usrs/ee/code-swe-data/deepswe-data-gen/eval/chat_templates/qwen3_thinking_acc.jinja2
  sequence_length: 65536
  max_rows_per_file: 0
  max_examples: 0
  parquet_batch_size: 128
  overlength_strategy: split
  min_label_tokens: 1
  shuffle_files: false
  shuffle_jsonl_rows: false
  jsonl_offsets_path: null
  seed: 61654
  repeat: true
  log_every_packs: 100
  require_assistant_reasoning_for_loss: true
  require_assistant_tool_calls_for_loss: true
  drop_assistant_content_for_tool_calls: true
  assistant_loss_target: assistant
  reject_manual_patch_targets: true
  reject_unverified_submit_targets: true
  reject_nonpassing_submit_targets: true
  mask_tool_call_error_recovery: false
  mask_manual_patch_artifact_turns: false
  enable_turn_loss_weights: false
  mask_nonpassing_submit_turns: false
  mask_empty_patch_submit_turns: false

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  batch_size: 2
  shuffle: false
  num_workers: 2
  multiprocessing_context: fork
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  batch_size: 1
  shuffle: false
  num_workers: 1
  multiprocessing_context: fork
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1.0e-8
  lr: 1.0e-6
  weight_decay: 0.01
  fused: true

lr_scheduler:
  lr_decay_style: WSD
  lr_warmup_steps: 25
  lr_decay_steps: 80
  wsd_decay_steps: 30
  lr_wsd_decay_style: cosine
  min_lr: 5.0e-8
