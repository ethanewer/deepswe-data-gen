# Full-parameter BF16 SFT for Qwen/Qwen3-4B-Thinking-2507 on 8 x H200.
#
# Target data:
# /wbl-fast/usrs/ee/code-swe-data/data/new-synthetic-data/260612/
#   highquality-1x-duplicate-reasoning-90pct-30k-full
#
# Use the passed-only mini-swe-agent-aligned sharded raw view. It filters the
# requested 260612 source to rows with passed=true and reward>0 before rewriting
# the system/user scaffold and tool observations to match
# eval/chat_templates/qwen3_thinking_acc.jinja2 and the mini-swe-agent
# evaluation prompt.
#   highquality-1x-duplicate-reasoning-90pct-30k-full-miniswe-aligned-passed/data

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  # Global/local batch sizes are counts of packed sequences, not tokens.
  # With 8 GPUs: 16 * 65,536 = 1,048,576 tokens/global update.
  global_batch_size: 16
  local_batch_size: 2
  ckpt_every_steps: 50
  val_every_steps: 1000
  max_steps: 150

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 33333
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-4B-Thinking-2507
  attn_implementation: flash_attention_3
  torch_dtype: bf16
  output_hidden_states: true

compile:
  enabled: false
  mode: default
  fullgraph: false
  dynamic: true
  backend: null

fp8:
  enabled: false

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/qwen3_4b_thinking_swe260612_miniswe_aligned_passed_65k_reasoning_toolcall_sft/
  model_save_format: torch_save
  save_consolidated: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true
  enable_compile: true
  enable_fsdp2_prefetch: true
  fsdp2_backward_prefetch_depth: 3
  fsdp2_forward_prefetch_depth: 1

clip_grad_norm:
  enabled: true
  max_norm: 1.0

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

dataset:
  _target_: qwen_agentic_sft.online_packed_dataset.OnlinePackedChatDataset
  raw_root: /wbl-fast/usrs/ee/code-swe-data/data/new-synthetic-data/260612/highquality-1x-duplicate-reasoning-90pct-30k-full-miniswe-aligned-passed/data
  chat_template_path: /wbl-fast/usrs/ee/code-swe-data/deepswe-data-gen/eval/chat_templates/qwen3_thinking_acc.jinja2
  sequence_length: 65536
  max_rows_per_file: 0
  max_examples: 0
  parquet_batch_size: 128
  overlength_strategy: split
  min_label_tokens: 1
  shuffle_files: true
  seed: 33333
  repeat: true
  log_every_packs: 100
  require_assistant_reasoning_for_loss: true
  require_assistant_tool_calls_for_loss: true
  drop_assistant_content_for_tool_calls: true
  assistant_loss_target: assistant
  reject_manual_patch_targets: true
  reject_unverified_submit_targets: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  batch_size: 2
  shuffle: false
  num_workers: 2
  multiprocessing_context: fork
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2

validation_dataset:
  _target_: qwen_agentic_sft.online_packed_dataset.OnlinePackedChatDataset
  raw_root: data/smoke_raw
  chat_template_path: /wbl-fast/usrs/ee/code-swe-data/deepswe-data-gen/eval/chat_templates/qwen3_thinking_acc.jinja2
  sequence_length: 65536
  max_rows_per_file: 0
  max_examples: 128
  parquet_batch_size: 128
  overlength_strategy: split
  min_label_tokens: 1
  shuffle_files: false
  seed: 33333
  repeat: false
  log_every_packs: 0
  require_assistant_reasoning_for_loss: true
  require_assistant_tool_calls_for_loss: true
  drop_assistant_content_for_tool_calls: true
  assistant_loss_target: assistant
  reject_manual_patch_targets: true
  reject_unverified_submit_targets: true

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  batch_size: 1
  shuffle: false
  num_workers: 1
  multiprocessing_context: fork
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1.0e-8
  lr: 2.0e-6
  weight_decay: 0.01
  fused: true

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 10
  min_lr: 2.0e-7
